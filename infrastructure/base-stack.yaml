AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Shared AWS infrastructure for the cloud-monorepo — deployed once per
  environment (dev / prod). Currently holds the cross-platform reports
  bucket that platform stacks import. SES sender identity and shared
  CloudWatch dashboards land here in later passes.

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
  SesSenderEmail:
    Type: String
    Default: rarrington@sincerelyhers.com
    Description: >
      Verified SES email identity that platform stacks use as the sender
      for report-ready notifications. Creating this resource triggers a
      verification email to this address — clicking the link enables
      sending. Until verified, ses:SendEmail from the identity fails.

Resources:
  ReportsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "sincerelyhers-reports-${Environment}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: TransitionOlderObjects
            Status: Enabled
            Transitions:
              - StorageClass: STANDARD_IA
                TransitionInDays: 30
              - StorageClass: GLACIER
                TransitionInDays: 90

  SesSenderIdentity:
    Type: AWS::SES::EmailIdentity
    Properties:
      EmailIdentity: !Ref SesSenderEmail

Outputs:
  ReportsBucketArn:
    Description: ARN of the cross-platform reports bucket.
    Value: !GetAtt ReportsBucket.Arn
    Export:
      Name: !Sub "${AWS::StackName}-ReportsBucketArn"
  ReportsBucketName:
    Description: Name of the cross-platform reports bucket.
    Value: !Ref ReportsBucket
    Export:
      Name: !Sub "${AWS::StackName}-ReportsBucketName"
  SesSenderEmail:
    Description: Email address of the verified SES sender identity.
    Value: !Ref SesSenderEmail
    Export:
      Name: !Sub "${AWS::StackName}-SesSenderEmail"
  SesSenderIdentityArn:
    Description: ARN of the SES sender identity (for ses:SendEmail IAM scoping).
    Value: !Sub "arn:aws:ses:${AWS::Region}:${AWS::AccountId}:identity/${SesSenderEmail}"
    Export:
      Name: !Sub "${AWS::StackName}-SesSenderIdentityArn"

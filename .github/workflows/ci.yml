name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          python-version-file: .python-version
      - name: Install dependencies
        run: uv sync --frozen
      - name: Show installed amazon package layout
        run: |
          ls -la .venv/lib/python*/site-packages/ | grep -E 'sincerelyhers|handlers' || true
          cat .venv/lib/python*/site-packages/sincerelyhers_amazon.pth 2>/dev/null || true
          uv run python -c "import handlers, sys; print('handlers.__file__=', handlers.__file__); print('handlers.__path__=', list(handlers.__path__)); import os; print('listdir:', sorted(os.listdir(list(handlers.__path__)[0])))"
      - name: Run pytest
        run: uv run pytest

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          python-version-file: .python-version
      - name: Install dependencies
        run: uv sync --frozen
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .

  validate:
    name: Validate SAM templates
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-2
      AWS_DEFAULT_REGION: us-east-2
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true
      - name: Validate base stack
        run: sam validate --template infrastructure/base-stack.yaml --lint
      - name: Validate amazon platform stack
        run: sam validate --template platforms/amazon/template.yaml --lint

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          python-version-file: .python-version
      - name: Install dependencies
        run: uv sync --frozen
      - name: Run pytest
        run: uv run pytest
        env:
          PYTHONPATH: ${{ github.workspace }}/platforms/amazon/src

  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          python-version-file: .python-version
      - name: Install dependencies
        run: uv sync --frozen
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .

  validate:
    name: Validate SAM templates
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-2
      AWS_DEFAULT_REGION: us-east-2
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true
      - name: Validate base stack
        run: sam validate --template infrastructure/base-stack.yaml --lint
      - name: Validate amazon platform stack
        run: sam validate --template platforms/amazon/template.yaml --lint

AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Amazon SP-API prod secrets (app credentials, per-seller refresh tokens,
  and per-seller Odoo webhook config). Declared here so they are born from
  a DeploymentRole deploy — the only principal the ProtectProductionSecrets
  SCP lets write sp-api/* in prod. Deployed via `aws cloudformation deploy
  --parameter-overrides file://...` (NOT `sam deploy`), because samcli's
  parameter parser corrupts JSON values; see make deploy-amazon-secrets-prod
  and scripts/build_cfn_params.py. Deployed rarely (bootstrap, re-key,
  re-authorization, or webhook-secret rotation), kept separate from the
  frequently-redeployed platform stack so routine code deploys never need
  this secret material. Dev does NOT use this stack — dev secrets are
  created directly via the CLI. See platforms/amazon/CLAUDE.md
  (Production deployment) for the deploy mechanism and the
  rotation-drift caveat on app/credentials.

Parameters:
  SecretsPrefix:
    Type: String
    Default: sp-api/sincerely-services
    Description: Secret-name namespace for this SPP app.
  AppCredentialsJson:
    Type: String
    NoEcho: true
    Description: JSON {client_id, client_secret} — app-level LWA credentials.
  KKCredentialsJson:
    Type: String
    NoEcho: true
    Description: JSON {refresh_token} for seller KK.
  LLGCredentialsJson:
    Type: String
    NoEcho: true
    Description: JSON {refresh_token} for seller LLG.
  COCredentialsJson:
    Type: String
    NoEcho: true
    Description: JSON {refresh_token} for seller CO.
  73JCredentialsJson:
    Type: String
    NoEcho: true
    Description: JSON {refresh_token} for seller 73J.
  OHCredentialsJson:
    Type: String
    NoEcho: true
    Description: JSON {refresh_token} for seller OH.
  SHCredentialsJson:
    Type: String
    NoEcho: true
    Description: JSON {refresh_token} for seller SH.
  KKWebhookJson:
    Type: String
    NoEcho: true
    Description: JSON {secret, url, seller_id} for KK's amazon-feed Odoo webhook.
  LLGWebhookJson:
    Type: String
    NoEcho: true
    Description: JSON {secret, url, seller_id} for LLG's amazon-feed Odoo webhook.
  COWebhookJson:
    Type: String
    NoEcho: true
    Description: JSON {secret, url, seller_id} for CO's amazon-feed Odoo webhook.
  KKDataKioskJson:
    Type: String
    NoEcho: true
    Description: JSON {secret, url, account_id} for KK's amazon-datakiosk Odoo webhook.
  LLGDataKioskJson:
    Type: String
    NoEcho: true
    Description: JSON {secret, url, account_id} for LLG's amazon-datakiosk Odoo webhook.
  CODataKioskJson:
    Type: String
    NoEcho: true
    Description: JSON {secret, url, account_id} for CO's amazon-datakiosk Odoo webhook.
  73JDataKioskJson:
    Type: String
    NoEcho: true
    Description: JSON {secret, url, account_id} for 73J's amazon-datakiosk Odoo webhook.
  OHDataKioskJson:
    Type: String
    NoEcho: true
    Description: JSON {secret, url, account_id} for OH's amazon-datakiosk Odoo webhook.
  SHDataKioskJson:
    Type: String
    NoEcho: true
    Description: JSON {secret, url, account_id} for SH's amazon-datakiosk Odoo webhook.

Resources:
  # Retain on delete/replace so a stack teardown never destroys a live
  # prod credential. The relay/report Lambdas read these by name at runtime
  # (see src/sincerelyhers_amazon/credentials.py).
  AppCredentials:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub "${SecretsPrefix}/app/credentials"
      Description: App-level LWA credentials {client_id, client_secret}.
      SecretString: !Ref AppCredentialsJson
  KKCredentials:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub "${SecretsPrefix}/KK/credentials"
      Description: KK per-seller SP-API refresh token {refresh_token}.
      SecretString: !Ref KKCredentialsJson
  LLGCredentials:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub "${SecretsPrefix}/LLG/credentials"
      Description: LLG per-seller SP-API refresh token {refresh_token}.
      SecretString: !Ref LLGCredentialsJson
  COCredentials:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub "${SecretsPrefix}/CO/credentials"
      Description: CO per-seller SP-API refresh token {refresh_token}.
      SecretString: !Ref COCredentialsJson
  73JCredentials:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub "${SecretsPrefix}/73J/credentials"
      Description: 73J per-seller SP-API refresh token {refresh_token}.
      SecretString: !Ref 73JCredentialsJson
  OHCredentials:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub "${SecretsPrefix}/OH/credentials"
      Description: OH per-seller SP-API refresh token {refresh_token}.
      SecretString: !Ref OHCredentialsJson
  SHCredentials:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub "${SecretsPrefix}/SH/credentials"
      Description: SH per-seller SP-API refresh token {refresh_token}.
      SecretString: !Ref SHCredentialsJson
  # Per-seller Odoo webhook config (HMAC secret, URL, sellerId) for the
  # FEED_PROCESSING_FINISHED relay. The relay Lambda (in the platform stack)
  # reads these by name at runtime; see src/.../odoo_webhook.py.
  KKWebhookSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub "${SecretsPrefix}/KK/webhooks/amazon-feed"
      Description: KK FEED_PROCESSING_FINISHED Odoo relay config {secret, url, seller_id}.
      SecretString: !Ref KKWebhookJson
  LLGWebhookSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub "${SecretsPrefix}/LLG/webhooks/amazon-feed"
      Description: LLG FEED_PROCESSING_FINISHED Odoo relay config {secret, url, seller_id}.
      SecretString: !Ref LLGWebhookJson
  COWebhookSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub "${SecretsPrefix}/CO/webhooks/amazon-feed"
      Description: CO FEED_PROCESSING_FINISHED Odoo relay config {secret, url, seller_id}.
      SecretString: !Ref COWebhookJson
  # Per-seller Odoo webhook config (HMAC secret, URL, accountId) for the
  # DATA_KIOSK_QUERY_PROCESSING_FINISHED relay. Dispatch is on account_id
  # (full amzn1.merchant.o.<merchantToken>), not seller_id; see
  # src/handlers/datakiosk_relay.py.
  KKDataKioskWebhookSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub "${SecretsPrefix}/KK/webhooks/amazon-datakiosk"
      Description: KK DATA_KIOSK_QUERY_PROCESSING_FINISHED Odoo relay config {secret, url, account_id}.
      SecretString: !Ref KKDataKioskJson
  LLGDataKioskWebhookSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub "${SecretsPrefix}/LLG/webhooks/amazon-datakiosk"
      Description: LLG DATA_KIOSK_QUERY_PROCESSING_FINISHED Odoo relay config {secret, url, account_id}.
      SecretString: !Ref LLGDataKioskJson
  CODataKioskWebhookSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub "${SecretsPrefix}/CO/webhooks/amazon-datakiosk"
      Description: CO DATA_KIOSK_QUERY_PROCESSING_FINISHED Odoo relay config {secret, url, account_id}.
      SecretString: !Ref CODataKioskJson
  73JDataKioskWebhookSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub "${SecretsPrefix}/73J/webhooks/amazon-datakiosk"
      Description: 73J DATA_KIOSK_QUERY_PROCESSING_FINISHED Odoo relay config {secret, url, account_id}.
      SecretString: !Ref 73JDataKioskJson
  OHDataKioskWebhookSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub "${SecretsPrefix}/OH/webhooks/amazon-datakiosk"
      Description: OH DATA_KIOSK_QUERY_PROCESSING_FINISHED Odoo relay config {secret, url, account_id}.
      SecretString: !Ref OHDataKioskJson
  SHDataKioskWebhookSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub "${SecretsPrefix}/SH/webhooks/amazon-datakiosk"
      Description: SH DATA_KIOSK_QUERY_PROCESSING_FINISHED Odoo relay config {secret, url, account_id}.
      SecretString: !Ref SHDataKioskJson

Outputs:
  AppCredentialsArn:
    Description: ARN of the app-level credentials secret.
    Value: !Ref AppCredentials

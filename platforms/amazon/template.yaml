AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: >
  Amazon SP-API platform stack — ReportRequester (EventBridge-triggered)
  and ReportProcessor (SQS-triggered) Lambdas, DynamoDB job-tracking
  table, and the sp-api-report-ready SQS queue with its DLQ. Imports
  the shared reports bucket from the base stack.

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
  SecretsPrefix:
    Type: String
    Default: sp-api/sincerely-services
  BaseStackName:
    Type: String
    Default: sincerelyhers-base-dev
    Description: Name of the cross-environment base stack whose exports we import.
  NotificationRecipients:
    Type: CommaDelimitedList
    Default: rarrington@sincerelyhers.com
    Description: >
      Recipients of report-ready emails. Any non-empty list enables
      email delivery from ReportProcessor; set to an empty value to
      disable without code changes. In SES sandbox mode, every address
      here must already be verified in SES.

Globals:
  Function:
    Runtime: python3.14
    Architectures: [arm64]
    Timeout: 30
    MemorySize: 256

Resources:
  # ---- DynamoDB ----
  AmazonReportJobsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${Environment}-amazon-report-jobs"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: report_id
          AttributeType: S
      KeySchema:
        - AttributeName: report_id
          KeyType: HASH

  # ---- SQS ----
  ReportReadyDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${Environment}-sp-api-report-ready-dlq"
      MessageRetentionPeriod: 1209600  # 14 days
      SqsManagedSseEnabled: true

  ReportReadyQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${Environment}-sp-api-report-ready"
      VisibilityTimeout: 300  # 5 min — must exceed ReportProcessor Timeout
      SqsManagedSseEnabled: true
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt ReportReadyDLQ.Arn
        maxReceiveCount: 3

  ReportReadyQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref ReportReadyQueue
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowSPAPINotifications
            Effect: Allow
            Principal:
              AWS: "arn:aws:iam::437568002678:root"
            Action: sqs:SendMessage
            Resource: !GetAtt ReportReadyQueue.Arn

  # ---- IAM: ReportRequester ----
  ReportRequesterExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Environment}-ReportRequesterRole"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SecretsManagerRead
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${SecretsPrefix}/*"
        - PolicyName: DynamoDBWrite
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                Resource: !GetAtt AmazonReportJobsTable.Arn

  # ---- IAM: ReportProcessor ----
  ReportProcessorExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Environment}-ReportProcessorRole"
      MaxSessionDuration: 43200  # 12h — extends validity of pre-signed URLs we generate
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SecretsManagerRead
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: secretsmanager:GetSecretValue
                Resource: !Sub "arn:aws:secretsmanager:${AWS::Region}:${AWS::AccountId}:secret:${SecretsPrefix}/*"
        - PolicyName: SqsConsume
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt ReportReadyQueue.Arn
        - PolicyName: S3ReadWrite
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                Resource:
                  Fn::Sub:
                    - "${BucketArn}/amazon/*"
                    - BucketArn:
                        Fn::ImportValue: !Sub "${BaseStackName}-ReportsBucketArn"
        - PolicyName: DynamoDBReadWrite
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                Resource: !GetAtt AmazonReportJobsTable.Arn
        - PolicyName: SesSend
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: ses:SendEmail
                Resource:
                  Fn::ImportValue: !Sub "${BaseStackName}-SesSenderIdentityArn"

  # ---- Lambda: ReportRequester ----
  ReportRequesterFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${Environment}-ReportRequester"
      CodeUri: src/
      Handler: handlers.report_requester.lambda_handler
      Role: !GetAtt ReportRequesterExecutionRole.Arn
      Environment:
        Variables:
          REPORT_JOBS_TABLE: !Ref AmazonReportJobsTable
          SECRETS_PREFIX: !Ref SecretsPrefix

  # ---- Lambda: ReportProcessor ----
  ReportProcessorFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub "${Environment}-ReportProcessor"
      CodeUri: src/
      Handler: handlers.report_processor.lambda_handler
      Role: !GetAtt ReportProcessorExecutionRole.Arn
      Timeout: 240  # 4 min; SQS visibility of 5 min leaves a 1-min safety margin
      MemorySize: 512
      Environment:
        Variables:
          REPORT_JOBS_TABLE: !Ref AmazonReportJobsTable
          SECRETS_PREFIX: !Ref SecretsPrefix
          REPORTS_BUCKET:
            Fn::ImportValue: !Sub "${BaseStackName}-ReportsBucketName"
          SES_SENDER_EMAIL:
            Fn::ImportValue: !Sub "${BaseStackName}-SesSenderEmail"
          SES_RECIPIENTS: !Join [",", !Ref NotificationRecipients]
      Events:
        ReportReady:
          Type: SQS
          Properties:
            Queue: !GetAtt ReportReadyQueue.Arn
            BatchSize: 1

  # ---- EventBridge ----
  SincerelyhersReportScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${Environment}-sincerelyhers-fba-inventory-daily"
      Description: "Daily FBA all-inventory report for Sincerely Hers (dev shake-out cadence; production cadence will be monthly). DISABLED 2026-04-28 — implementation validated over 3 days; re-enable when adding more sellers or when prod cutover begins."
      ScheduleExpression: "cron(0 8 * * ? *)"
      State: DISABLED
      Targets:
        - Arn: !GetAtt ReportRequesterFunction.Arn
          Id: ReportRequesterTarget
          Input: >
            {
              "seller_alias": "SH",
              "marketplace_id": "ATVPDKIKX0DER",
              "report_type": "GET_FBA_MYI_ALL_INVENTORY_DATA",
              "lookback_days": 1
            }

  ReportRequesterInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ReportRequesterFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt SincerelyhersReportScheduleRule.Arn

  KKReportScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${Environment}-kk-fba-inventory-daily"
      Description: "Daily FBA all-inventory report for KK (dev shake-out cadence; production cadence will be monthly). DISABLED 2026-04-28 — implementation validated over 3 days; re-enable when adding more sellers or when prod cutover begins."
      ScheduleExpression: "cron(15 8 * * ? *)"
      State: DISABLED
      Targets:
        - Arn: !GetAtt ReportRequesterFunction.Arn
          Id: ReportRequesterTarget
          Input: >
            {
              "seller_alias": "KK",
              "marketplace_id": "ATVPDKIKX0DER",
              "report_type": "GET_FBA_MYI_ALL_INVENTORY_DATA",
              "lookback_days": 1
            }

  KKReportRequesterInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ReportRequesterFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt KKReportScheduleRule.Arn

Outputs:
  ReportRequesterFunctionArn:
    Description: ARN of the ReportRequester Lambda
    Value: !GetAtt ReportRequesterFunction.Arn
  ReportProcessorFunctionArn:
    Description: ARN of the ReportProcessor Lambda
    Value: !GetAtt ReportProcessorFunction.Arn
  ReportReadyQueueArn:
    Description: ARN of the sp-api-report-ready queue (subscribe SP-API notifications here).
    Value: !GetAtt ReportReadyQueue.Arn
  ReportReadyDLQArn:
    Description: ARN of the DLQ for sp-api-report-ready.
    Value: !GetAtt ReportReadyDLQ.Arn
  ReportJobsTableName:
    Description: Name of the DynamoDB report-jobs table
    Value: !Ref AmazonReportJobsTable
